{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-bg d-flex align-items-center">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="login-card">

                    <h2 class="text-center mb-4">
                        Customer Login
                    </h2>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter your password"
                                required
                            >
                        </div>

                        <button class="btn btn-primary w-100 p-2">
                            Login
                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Don't have an account?
                        <a href="/register/">Register</a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
